<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tranzForma APD analyzer</title>
<link rel="stylesheet" href="../shared/common.css">
<link rel="stylesheet" href="analyzer.css">
</head>
<body>

<header>
  <img src="../shared/logo.png" alt="tranzForma">
  <h1><span>tranzForma</span> APD analyzer</h1>
  <span class="ver">v1.2</span>
</header>

<div class="content">

  <!-- Drop pair -->
  <div class="drop-pair">
    <div class="apd-slot">
      <div class="apd-drop-label">APD — A（移行元）</div>
      <div class="apd-drop" id="dropA">
        <div class="icon">📦</div>
        <span>クリックまたはドロップ</span>
        <span class="drop-filename" id="fileAName"></span>
        <input type="file" id="fileA" accept=".apd,.xml,.txt">
      </div>
      <div class="slot-actions">
        <button class="btn btn-secondary" id="listBtnA"   onclick="renderListResult('A')"   disabled>📋 フォーム一覧</button>
        <button class="btn btn-secondary" id="ledgerBtnA" onclick="renderLedgerResult('A')" disabled>📒 元帳設定</button>
        <button class="btn btn-secondary" id="scriptBtnA" onclick="renderScriptResult('A')" disabled>📜 スクリプト</button>
      </div>
    </div>
    <div class="apd-slot">
      <div class="apd-drop-label">APD — B（移行先）</div>
      <div class="apd-drop" id="dropB">
        <div class="icon">📦</div>
        <span>クリックまたはドロップ</span>
        <span class="drop-filename" id="fileBName"></span>
        <input type="file" id="fileB" accept=".apd,.xml,.txt">
      </div>
      <div class="slot-actions">
        <button class="btn btn-secondary" id="listBtnB"   onclick="renderListResult('B')"   disabled>📋 フォーム一覧</button>
        <button class="btn btn-secondary" id="ledgerBtnB" onclick="renderLedgerResult('B')" disabled>📒 元帳設定</button>
        <button class="btn btn-secondary" id="scriptBtnB" onclick="renderScriptResult('B')" disabled>📜 スクリプト</button>
      </div>
    </div>
  </div>

  <div class="compare-row">
    <button class="btn btn-primary" id="compareBtn" onclick="runCompare()" disabled>🔀 差分比較</button>
  </div>

  <!-- Dynamic result area -->
  <div id="resultArea" style="display:none">

    <!-- フォーム一覧 -->
    <div id="listResult" style="display:none">
      <div class="action-row">
        <span id="listSummary" class="result-label"></span>
        <button class="btn btn-fix" onclick="copyListTSV()">📋 TSVをコピー</button>
        <button class="btn btn-fix" onclick="downloadFormZip()">⬇ フォームZIP</button>
      </div>
      <div class="table-wrap">
        <table id="listTable">
          <thead>
            <tr>
              <th>フォームリスト</th>
              <th>リスト名</th>
              <th>フォームラベル</th>
              <th>名称 JA</th>
              <th>名称 EN</th>
              <th>IMP</th>
              <th>EXP</th>
              <th>REFLECT</th>
              <th>パラメータ</th>
              <th>トリガー</th>
            </tr>
          </thead>
          <tbody id="listTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 元帳設定 -->
    <div id="ledgerResult" style="display:none">
      <div class="action-row">
        <span id="ledgerSummary" class="result-label"></span>
        <button class="btn btn-fix" onclick="copyLedgerTSV()">📋 TSVをコピー</button>
      </div>
      <div class="table-wrap">
        <table id="ledgerTable">
          <thead id="ledgerThead"></thead>
          <tbody id="ledgerTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- スクリプト -->
    <div id="scriptResult" style="display:none">
      <div class="action-row">
        <span id="scriptSummary" class="result-label"></span>
        <button class="btn btn-fix" onclick="copyScriptTSV()">📋 TSVをコピー</button>
        <button class="btn btn-fix" onclick="downloadScriptZip()">⬇ スクリプトZIP</button>
      </div>
      <div class="table-wrap">
        <table id="scriptTable">
          <thead>
            <tr>
              <th>ラベル</th>
              <th>名称 JA</th>
              <th>名称 EN</th>
              <th>エラー</th>
            </tr>
          </thead>
          <tbody id="scriptTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 差分比較 -->
    <div id="compareResult" style="display:none">
      <div class="chip-row" id="filterChips"></div>
      <div class="table-wrap">
        <table id="compareTable">
          <thead>
            <tr>
              <th>フォームラベル</th>
              <th>ステータス</th>
              <th>フォームリスト</th>
              <th>名称 JA</th>
              <th>名称 EN</th>
              <th>IMP</th>
              <th>EXP</th>
              <th>REFLECT</th>
            </tr>
          </thead>
          <tbody id="compareTbody"></tbody>
        </table>
      </div>

      <div class="migrate-section" id="migrateSection">
        <div class="migrate-heading">移行</div>
        <div class="dir-btns">
          <button class="dir-btn active" id="dirAtoB" onclick="setDir('AtoB')">A → B</button>
          <button class="dir-btn"        id="dirBtoA" onclick="setDir('BtoA')">B → A</button>
        </div>
        <div class="migrate-info" id="migrateInfo"></div>
        <div class="action-row">
          <button class="btn btn-fix" onclick="downloadMigrate()">⬇ ZIPをダウンロード</button>
          <span class="result-label">※ インターネット接続が必要です</span>
        </div>
      </div>
    </div>

  </div>

</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="analyzer.js"></script>
</body>
</html>
