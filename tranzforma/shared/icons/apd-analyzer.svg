<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#64b5f6" stroke-linecap="round" stroke-linejoin="round">
  <!-- box body -->
  <rect x="8" y="24" width="32" height="18" rx="3" stroke-width="2.5" fill="rgba(100,181,246,0.08)"/>
  <!-- lid (floating open, tilted back) -->
  <path d="M6 24L10 14H38L42 24" stroke-width="2.5" fill="rgba(100,181,246,0.06)"/>
  <!-- gap between lid and box -->
  <line x1="8" y1="24" x2="40" y2="24" stroke-width="0" opacity="0"/>
  <!-- light rays bursting from gap -->
  <line x1="24" y1="22" x2="24" y2="5" stroke-width="2" opacity="0.45"/>
  <line x1="17" y1="22" x2="13" y2="7" stroke-width="1.8" opacity="0.35"/>
  <line x1="31" y1="22" x2="35" y2="7" stroke-width="1.8" opacity="0.35"/>
  <line x1="12" y1="23" x2="7" y2="12" stroke-width="1.5" opacity="0.25"/>
  <line x1="36" y1="23" x2="41" y2="12" stroke-width="1.5" opacity="0.25"/>
  <!-- sparkles -->
  <circle cx="24" cy="3" r="1.2" fill="#64b5f6" stroke="none" opacity="0.6"/>
  <circle cx="11" cy="5" r="1" fill="#64b5f6" stroke="none" opacity="0.4"/>
  <circle cx="37" cy="5" r="1" fill="#64b5f6" stroke="none" opacity="0.4"/>
</svg>
